<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Pokemon</title>
</head>
<body>
    <h1>Add Pokemon</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label for="nome_pokemon">Pokemon name or ID:</label><br>
        <input type="text" id="nome_pokemon" name="nome_pokemon" required><br><br>
        <button type="submit">Add</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Back to list</a>

</body>
</html>
