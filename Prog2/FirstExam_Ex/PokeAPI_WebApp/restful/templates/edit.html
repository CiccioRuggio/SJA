<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit {{ creature.name | capitalize }}</title>
</head>
<body>
    <h1>Edit {{ creature.name | capitalize }}</h1>

    {% if creature.sprite %}
        <img src="{{ creature.sprite }}" alt="{{ creature.name }}">
    {% endif %}
    <p>Pokedex ID: #{{ creature.id }}</p>
    <p>Types: {{ creature.get_types() | join(', ') }}</p>

    <form method="POST">
        <label for="height">Height:</label><br>
        <input type="number" id="height" name="height" value="{{ creature.height }}" required><br><br>

        <label for="weight">Weight:</label><br>
        <input type="number" id="weight" name="weight" value="{{ creature.weight }}" required><br><br>

        <button type="submit">Save</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Back to list</a>

</body>
</html>
