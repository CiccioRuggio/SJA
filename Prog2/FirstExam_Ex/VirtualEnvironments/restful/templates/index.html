<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>lista prodotti</title>
</head>
<body>
	<h1>Lista Prodotti</h1>
	<a href="{{ url_for('add_product') }}">Aggiungi nuovo prodotto</a>
	<ul>
	{% for product in products %}
		<li>
			<a href="{{ url_for('view_product', name=product.name) }}">
				<strong>{{ product.name }}</strong>
			</a> - {{ "%.2f"|format(product.price) }}<br>

			{% if product.image_url %}
				<img src="{{ product.image_url }}" alt="{{ product.name }}" width="100"><br>
			{% endif %}

			<form action="{{ url_for('delete_product', name=product.name) }}" method="POST" style="display:inline;">
				<button type="submit">Elimina</button>
			</form>
			<a href="{{ url_for('edit_product', name=product.name) }}">Modifica</a>
		</li>
	{% else %}
		<li>Nessun prodotto disponibile.</li>
	{% endfor %}
	</ul>
	<br>
	<a href="/this-route-does-not-exist">
    Test 404
	</a>

</body>
</html>
